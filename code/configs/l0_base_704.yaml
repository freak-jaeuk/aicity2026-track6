# L0 - base 704 inference (reference)
name: l0_base_704
mode: inference
checkpoint: shared 704-trained checkpoint (checkpoint_best_total = higher-scoring of EMA/regular; exported as run1_best.zip)
inference:
  resolution: 704  # model default; no --inference.resolution flag was passed
  num_select: 300  # effective value; CLI default None falls back to the model's built-in 300
  max_dets: 100
  resize: square direct resize to 704x704 (bilinear)
  positional_embedding: training grid; no larger-grid interpolation
  coordinate_restoration: predictions rescaled from network input size back to original image size
  box_clipping: boxes clipped to image bounds
  compile: true    # L0 passed no --inference.no-compile; it evaluates at the checkpoint's native square resolution
  confidence_threshold: 0.01   # code default (benchmark.schema.json); low threshold for COCO-AP evaluation
